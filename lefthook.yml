commit-msg:
  commands:
    lint-commit-msg:
      run: pnpm dlx commitlint --edit
pre-commit:
  parallel: true
  jobs:
    - name: Oxfmt
      glob: '*.{json,md,yaml,yml,js,ts}'
      run: pnpm oxfmt {staged_files}
      stage_fixed: true
    - name: Ruff Check
      glob: 'src/liquidctl_server/**/*.py'
      run: uv run --project src/liquidctl_server ruff check --fix {staged_files}
      stage_fixed: true
    - name: Ruff format
      glob: 'src/liquidctl_server/**/*.py'
      run: uv run --project src/liquidctl_server ruff format {staged_files}
      stage_fixed: true
    - name: Dotnet format
      glob: 'src/FanControl.Liquidctl/**/*.cs'
      run: dotnet format src/FanControl.Liquidctl/FanControl.Liquidctl.csproj --include {staged_files}
      stage_fixed: true
