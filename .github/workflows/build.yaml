name: Build

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact-name }}
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.artifact-name }}
    steps:
      - name: Set Artifact Name
        id: set-artifact-name
        run: |
          if ("${{ github.event.pull_request.number }}" -ne "") {
            $artifactName = "FanControl.Liquidctl-PR-${{ github.event.pull_request.number }}"
          } else {
            $artifactName = "FanControl.Liquidctl-Build-${{ github.run_number }}"
          }
          echo "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Nuitka
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\Nuitka\Nuitka
            ~\.cache\Nuitka
          key: nuitka-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nuitka-${{ runner.os }}-

      - name: Build .NET Plugin
        run: |
          Set-Location .\src\FanControl.Liquidctl
          dotnet build -c Release

      - name: Get Version
        id: get-version
        run: |
          $manifest = Get-Content ".release-please-manifest.json" | ConvertFrom-Json
          $version = $manifest."."
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Python Bridge
        run: |
          Set-Location .\src\liquidctl_server
          uv sync
          uv run ruff check

          $serverDir = Resolve-Path "."
          $commonArgs = @(
            "--msvc=latest",
            "--output-filename=liquidctl_server.exe",
            "--remove-output",
            "--assume-yes-for-downloads",
            "--windows-console-mode=disable",
            "--windows-icon-from-ico=liquidctl.ico",
            ".\liquidctl_server\server.py"
          )

          $onefileProc = Start-Process -FilePath "uv" -ArgumentList (@(
            "run", "python", "-m", "nuitka",
            "--onefile",
            "--onefile-tempdir-spec={CACHE_DIR}/FanControl.LiquidCtl/${{ steps.get-version.outputs.version }}",
            "--output-dir=dist/onefile"
          ) + $commonArgs) -WorkingDirectory $serverDir -NoNewWindow -PassThru -RedirectStandardOutput onefile_stdout.log -RedirectStandardError onefile_stderr.log

          $standaloneProc = Start-Process -FilePath "uv" -ArgumentList (@(
            "run", "python", "-m", "nuitka",
            "--standalone",
            "--output-dir=dist/standalone"
          ) + $commonArgs) -WorkingDirectory $serverDir -NoNewWindow -PassThru -RedirectStandardOutput standalone_stdout.log -RedirectStandardError standalone_stderr.log

          $onefileProc.WaitForExit()
          $standaloneProc.WaitForExit()

          Get-Content onefile_stderr.log
          Get-Content standalone_stderr.log

          if ($onefileProc.ExitCode -ne 0) { throw "Onefile build failed with exit code $($onefileProc.ExitCode)" }
          if ($standaloneProc.ExitCode -ne 0) { throw "Standalone build failed with exit code $($standaloneProc.ExitCode)" }

      - name: Create Artifact Archives
        run: |
          $dll = ".\src\FanControl.Liquidctl\bin\Release\net8.0\FanControl.Liquidctl.dll"

          Compress-Archive -Path $dll, ".\src\liquidctl_server\dist\onefile\liquidctl_server.exe" -DestinationPath ".\FanControl.Liquidctl.zip"

          Rename-Item ".\src\liquidctl_server\dist\standalone\server.dist" "liquidctl_server"
          Compress-Archive -Path $dll, ".\src\liquidctl_server\dist\standalone\liquidctl_server" -DestinationPath ".\FanControl.Liquidctl-standalone.zip"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.set-artifact-name.outputs.artifact-name }}
          path: |
            FanControl.Liquidctl.zip
            FanControl.Liquidctl-standalone.zip
          retention-days: 30
