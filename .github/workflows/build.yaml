name: Build

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - src/**/*
      - .github/workflows/*.yaml

jobs:
  check-dotnet:
    name: Check Dotnet
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Build .NET Plugin
        run: |
          Set-Location .\src\FanControl.Liquidctl
          dotnet build -c Release

  check-dotnet-tests:
    name: Dotnet Tests
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Run .NET Tests
        run: |
          Set-Location .\src\FanControl.Liquidctl.Tests
          dotnet test -c Release --logger "console;verbosity=normal"

  check-python:
    name: Check Python
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Lint Python Bridge
        run: |
          Set-Location .\src\liquidctl_server
          uv sync
          uv run ruff check

  build:
    name: Build
    runs-on: windows-latest
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.artifact-name }}
    steps:
      - name: Set Artifact Name
        id: set-artifact-name
        run: |
          $artifactName = "FanControl.Liquidctl-PR-${{ github.event.pull_request.number }}"
          echo "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Cache Nuitka
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~\AppData\Local\Nuitka\Nuitka
            ~\.cache\Nuitka
          key: nuitka-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nuitka-${{ runner.os }}-

      - name: Build and Archive
        run: pwsh ./scripts/release.ps1

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.set-artifact-name.outputs.artifact-name }}
          path: |
            FanControl.Liquidctl.zip
          retention-days: 30
