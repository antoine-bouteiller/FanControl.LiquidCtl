name: Build

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - src/**/*
      - .github/workflows/*.yaml

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - 'src/FanControl.Liquidctl/**'
              - 'src/liquidctl_server/**'

  check-dotnet:
    name: Check Dotnet
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Build .NET Plugin
        run: |
          Set-Location .\src\FanControl.Liquidctl
          dotnet build -c Release

  check-dotnet-tests:
    name: Dotnet Tests
    runs-on: windows-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Run .NET Tests
        run: |
          Set-Location .\src\FanControl.Liquidctl.Tests
          dotnet test -c Release --logger "console;verbosity=normal" --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Coverage Summary
        if: always()
        run: |
          $f = Get-ChildItem .\src\FanControl.Liquidctl.Tests\TestResults -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1
          if ($f) {
            $xml = [xml](Get-Content $f.FullName)
            $line = [math]::Round([double]$xml.coverage.'line-rate' * 100, 1)
            $branch = [math]::Round([double]$xml.coverage.'branch-rate' * 100, 1)
            "## .NET Coverage`n- Lines: $line%`n- Branches: $branch%" >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Generate Coverage Report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          $f = Get-ChildItem .\src\FanControl.Liquidctl.Tests\TestResults -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1 -ExpandProperty FullName
          reportgenerator "-reports:$f" "-targetdir:src\FanControl.Liquidctl.Tests\coverage-report" -reporttypes:Html

      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dotnet-coverage-report
          path: src/FanControl.Liquidctl.Tests/coverage-report/
          retention-days: 30

      - name: Publish Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Dotnet Tests
          path: src/FanControl.Liquidctl.Tests/TestResults/test-results.trx
          reporter: dotnet-trx

  check-python:
    name: Check Python
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Lint Python Bridge
        run: |
          Set-Location .\src\liquidctl_server
          uv sync
          uv run ruff check

  check-python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run Python Tests
        run: |
          cd src/liquidctl_server
          uv sync --group dev
          uv run pytest tests/ \
            --junitxml=test-results.xml \
            --cov=liquidctl_server \
            --cov-report=html:coverage-report

      - name: Coverage Summary
        if: always()
        run: cd src/liquidctl_server && uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Publish Test Results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Python Tests
          path: src/liquidctl_server/test-results.xml
          reporter: java-junit

      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: python-coverage-report
          path: src/liquidctl_server/coverage-report/
          retention-days: 30

  build:
    name: Build
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: windows-latest
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.artifact-name }}
    steps:
      - name: Set Artifact Name
        id: set-artifact-name
        run: |
          $artifactName = "FanControl.Liquidctl-PR-${{ github.event.pull_request.number }}"
          echo "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Cache Nuitka
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~\AppData\Local\Nuitka\Nuitka
            ~\.cache\Nuitka
          key: nuitka-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nuitka-${{ runner.os }}-

      - name: Build and Archive
        run: pwsh ./scripts/release.ps1

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.set-artifact-name.outputs.artifact-name }}
          path: |
            FanControl.Liquidctl.zip
          retention-days: 30
