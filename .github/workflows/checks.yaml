name: Quality Checks

on:
  workflow_call:

permissions:
  checks: write
  pull-requests: write

jobs:
  check-dotnet:
    name: Check Dotnet
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Build .NET Plugin
        run: |
          Set-Location .\src\FanControl.Liquidctl
          dotnet build -c Release

  check-dotnet-tests:
    name: Dotnet Tests
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Run .NET Tests
        run: |
          Set-Location .\src\FanControl.Liquidctl.Tests
          dotnet test -c Release --logger "console;verbosity=normal" --logger "trx;LogFileName=test-results.trx" --logger "junit;LogFilePath=test-results-junit.xml" --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: src/FanControl.Liquidctl.Tests/TestResults/**/coverage.cobertura.xml
          flags: dotnet

      - name: Upload Test Results to Codecov
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: src/FanControl.Liquidctl.Tests/TestResults/test-results-junit.xml
          flags: dotnet

  check-python:
    name: Check Python
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Lint Python Bridge
        run: |
          Set-Location .\src\liquidctl_server
          uv sync
          uv run ruff check

  check-python-tests:
    name: Python Tests
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run Python Tests
        run: |
          Set-Location .\src\liquidctl_server
          uv sync --group dev
          uv run pytest tests/ `
            --junitxml=test-results.xml `
            --cov=liquidctl_server `
            --cov-report=xml:coverage.xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: src/liquidctl_server/coverage.xml
          flags: python

      - name: Upload Test Results to Codecov
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: src/liquidctl_server/test-results.xml
          flags: python
