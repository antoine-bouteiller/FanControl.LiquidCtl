name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  release:
    name: Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Enforce develop is up to date with main
        if: github.ref == 'refs/heads/develop'
        run: |
          git merge-base --is-ancestor origin/main origin/develop
          if ($LASTEXITCODE -ne 0) {
            echo "ERROR: 'develop' is behind 'main'."
            echo "Please rebase 'main' into 'develop' before creating a pre-release."
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Setup pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
        with:
          run_install: true
          cache: true

      - name: Cache Nuitka
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~\AppData\Local\Nuitka\Nuitka
            ~\.cache\Nuitka
          key: nuitka-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nuitka-${{ runner.os }}-

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
