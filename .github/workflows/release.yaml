name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # to create release commit
      issues: write # to add labels
      pull-requests: write # to create release PR
    outputs:
      release_created: ${{ steps.semantic.outputs.new_release_published }}
      tag_name: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    uses: ./.github/workflows/build.yaml

  upload:
    needs: [release, build]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: windows-latest
    permissions:
      contents: write # to upload release artifact
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Build Artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build.outputs.artifact-name }}

      - name: Upload Release Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release.outputs.tag_name }} ./FanControl.Liquidctl.zip
