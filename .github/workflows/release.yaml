name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

jobs:
  release:
    name: Release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Enforce develop is up to date with main
        if: github.ref == 'refs/heads/develop'
        run: |
          git merge-base --is-ancestor origin/main origin/develop
          if ($LASTEXITCODE -ne 0) {
            echo "ERROR: 'develop' is behind 'main'."
            echo "Please rebase 'main' into 'develop' before creating a pre-release."
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Nuitka
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~\AppData\Local\Nuitka\Nuitka
            ~\.cache\Nuitka
          key: nuitka-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nuitka-${{ runner.os }}-

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
