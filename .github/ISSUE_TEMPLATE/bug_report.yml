name: Bug Report
description: Report a bug or issue with FanControl.Liquidctl
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue. Please fill out the information below to help me diagnose the problem. Before submitting, please ensure you are using the latest version of FanControl and this plugin, and ensure that you have the dotnet 10 release of FanControl installed and not the 4.8 one.

  - type: textarea
    id: devices
    attributes:
      label: Devices
      description: List the liquidctl-compatible devices connected to your system (e.g. NZXT Kraken X63, NZXT Smart Device V2)
      placeholder: |
        - NZXT Kraken X63
        - NZXT Smart Device V2
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue you are experiencing
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant logs from FanControl or upload the log file. You can find them in the FanControl folder.
    validations:
      required: true
