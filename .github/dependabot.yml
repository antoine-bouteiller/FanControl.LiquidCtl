version: 2

updates:
  - package-ecosystem: uv
    directory: /src/liquidctl_server
    schedule:
      interval: daily
    commit-message:
      prefix: 'chore'
      include: 'scope'
      prefix-development: 'chore'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: 'chore'
      include: 'scope'
